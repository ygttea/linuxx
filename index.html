<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux | Bir Rüya Gördüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #ff006e;
            --accent: #8338ec;
            --bg-dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1);
            filter: brightness(0.3) saturate(1.2);
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(131, 56, 236, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 0, 110, 0.2) 0%, transparent 70%);
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: float 20s infinite;
            box-shadow: 0 0 10px var(--primary);
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1.5);
            }
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Glass Card */
        .card {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardEntry 1s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s ease;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 8s infinite;
        }

        @keyframes shimmer {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            animation: rotate 10s linear infinite;
            opacity: 0.8;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .profile-ring-inner {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--bg-dark);
        }

        .profile-img {
            position: absolute;
            inset: 5px;
            width: calc(100% - 10px);
            height: calc(100% - 10px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .profile-wrapper:hover .profile-img {
            transform: scale(1.05);
        }

        .status-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: #10b981;
            border: 3px solid var(--bg-dark);
            border-radius: 50%;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }

        .username {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .bio {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto;
        }

        /* Enhanced Music Player */
        .music-player {
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .music-player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            opacity: 0.8;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .music-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .album-art-wrapper {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        .album-art {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .album-art.playing {
            animation-play-state: running;
        }

        .album-art:hover {
            transform: scale(1.05);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .vinyl-groove {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: rgba(0,0,0,0.9);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .track-details {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-bottom: 6px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .artist-name {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .artist-name::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--secondary);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 4px 15px rgba(0, 212, 255, 0.4),
                0 0 30px rgba(0, 212, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 
                0 6px 25px rgba(0, 212, 255, 0.6),
                0 0 40px rgba(0, 212, 255, 0.3);
        }

        .play-btn:hover::before {
            transform: translateX(100%);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        /* Progress Section */
        .progress-section {
            margin-bottom: 12px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 2s infinite;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--primary);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        /* Enhanced Visualizer */
        .visualizer-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 30px;
            flex: 1;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, var(--primary), var(--secondary));
            border-radius: 2px;
            transition: height 0.1s ease;
            box-shadow: 0 0 10px currentColor;
        }

        .bar:nth-child(1) { height: 10%; animation: equalize1 0.8s ease-in-out infinite alternate; }
        .bar:nth-child(2) { height: 30%; animation: equalize2 0.6s ease-in-out infinite alternate; }
        .bar:nth-child(3) { height: 50%; animation: equalize3 0.7s ease-in-out infinite alternate; }
        .bar:nth-child(4) { height: 70%; animation: equalize4 0.5s ease-in-out infinite alternate; }
        .bar:nth-child(5) { height: 40%; animation: equalize5 0.9s ease-in-out infinite alternate; }
        .bar:nth-child(6) { height: 60%; animation: equalize6 0.4s ease-in-out infinite alternate; }
        .bar:nth-child(7) { height: 80%; animation: equalize7 0.8s ease-in-out infinite alternate; }
        .bar:nth-child(8) { height: 35%; animation: equalize8 0.6s ease-in-out infinite alternate; }
        .bar:nth-child(9) { height: 55%; animation: equalize9 0.7s ease-in-out infinite alternate; }
        .bar:nth-child(10) { height: 25%; animation: equalize10 0.5s ease-in-out infinite alternate; }

        @keyframes equalize1 { to { height: 60%; } }
        @keyframes equalize2 { to { height: 80%; } }
        @keyframes equalize3 { to { height: 40%; } }
        @keyframes equalize4 { to { height: 90%; } }
        @keyframes equalize5 { to { height: 70%; } }
        @keyframes equalize6 { to { height: 50%; } }
        @keyframes equalize7 { to { height: 30%; } }
        @keyframes equalize8 { to { height: 85%; } }
        @keyframes equalize9 { to { height: 45%; } }
        @keyframes equalize10 { to { height: 65%; } }

        .music-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            animation: livePulse 1.5s infinite;
            box-shadow: 0 0 10px var(--secondary);
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Links Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--btn-color, #fff) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            border-color: var(--btn-color, rgba(255,255,255,0.2));
            background: rgba(255,255,255,0.06);
        }

        .link-btn:hover::before {
            opacity: 0.1;
        }

        .link-btn i {
            font-size: 1.2rem;
            color: var(--btn-color, #fff);
            transition: transform 0.3s;
        }

        .link-btn:hover i {
            transform: scale(1.2) rotate(5deg);
        }

        .link-text {
            position: relative;
            z-index: 1;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Volume Control */
        .volume-control {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
            transition: all 0.3s;
        }

        .volume-control:hover {
            background: rgba(0,0,0,0.8);
            transform: translateX(-50%) scale(1.05);
        }

        .volume-icon {
            color: var(--primary);
            font-size: 1rem;
            width: 20px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
            transition: transform 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: rgba(0,0,0,0.9);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .volume-control:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        /* Lyrics Panel */
        .lyrics-panel {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100vh;
            background: linear-gradient(135deg, rgba(10,10,15,0.98) 0%, rgba(20,20,30,0.95) 100%);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            box-shadow: -10px 0 50px rgba(0,0,0,0.5);
        }

        .lyrics-panel.active {
            right: 0;
        }

        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .lyrics-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-lyrics {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-lyrics:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg);
        }

        .lyrics-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .lyrics-content::-webkit-scrollbar {
            width: 6px;
        }

        .lyrics-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .lyrics-content::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .lyrics-line {
            font-size: 1.1rem;
            line-height: 2;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .lyrics-line:hover {
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.7);
        }

        .lyrics-line.active {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(255,0,110,0.1));
            border: 1px solid rgba(0,212,255,0.2);
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
            transform: scale(1.02);
        }

        .lyrics-line.passed {
            color: rgba(255,255,255,0.6);
        }

        .lyrics-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mini-album-art {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .mini-track-info {
            flex: 1;
        }

        .mini-track-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .mini-artist-name {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        /* Lyrics Toggle Button */
        .lyrics-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .lyrics-toggle:hover {
            background: rgba(0,212,255,0.2);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .lyrics-toggle.active {
            background: var(--primary);
            color: #000;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .lyrics-panel {
                width: 100%;
                right: -100%;
                padding: 30px 20px;
            }
            
            .card {
                padding: 30px 20px;
            }
            
            .username {
                font-size: 1.75rem;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Animation */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: loaderSpin 1s linear infinite;
        }

        @keyframes loaderSpin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Background -->
    <div class="bg-container">
        <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?q=80&w=2070&auto=format&fit=crop" alt="Background" class="bg-image" id="bg-image">
        <div class="gradient-overlay"></div>
        <div class="noise"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Lyrics Panel -->
    <div class="lyrics-panel" id="lyrics-panel">
        <div class="lyrics-header">
            <h2 class="lyrics-title">Şarkı Sözleri</h2>
            <button class="close-lyrics" id="close-lyrics">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        
        <div class="lyrics-content" id="lyrics-content">
            <!-- Lyrics will be inserted here -->
        </div>
        
        <div class="lyrics-footer">
            <img src="https://i.ytimg.com/vi/PHvKfw-o0Rk/maxresdefault.jpg" alt="Album" class="mini-album-art">
            <div class="mini-track-info">
                <div class="mini-track-name">Bir Rüya Gördüm</div>
                <div class="mini-artist-name">Elif Doğan</div>
            </div>
            <button class="play-btn" id="lyrics-play-btn" style="width: 40px; height: 40px; font-size: 0.9rem;">
                <i class="fa-solid fa-play"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <!-- Lyrics Toggle -->
            <button class="lyrics-toggle" id="lyrics-toggle" title="Şarkı Sözleri">
                <i class="fa-solid fa-align-center"></i>
            </button>

            <!-- Profile -->
            <div class="profile-section">
                <div class="profile-wrapper">
                    <div class="profile-ring"></div>
                    <div class="profile-ring-inner"></div>
                    <img src="https://cdn.discordapp.com/avatars/1305977261454917703/5d680e3ff33e58ef19d6dfd1041119c8.webp?size=1024" alt="Profile" class="profile-img" id="profile-pic">
                    <div class="status-indicator"></div>
                </div>
                
                <div class="badge">
                    <i class="fa-solid fa-code"></i>
                    Developer
                </div>
                
                <h1 class="username">Linux</h1>
                <p class="bio">only linux • open source enthusiast • night owl</p>
            </div>

            <!-- Enhanced Music Player -->
            <div class="music-player">
                <div class="music-header">
                    <div class="album-art-wrapper">
                        <img src="https://i.ytimg.com/vi/PHvKfw-o0Rk/maxresdefault.jpg" alt="Album Art" class="album-art" id="album-art">
                        <div class="vinyl-groove"></div>
                    </div>
                    
                    <div class="track-details">
                        <span class="track-name" id="track-name">Bir Rüya Gördüm</span>
                        <span class="artist-name" id="artist-name">Elif Doğan</span>
                    </div>
                    
                    <button class="play-btn" id="play-btn">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
                
                <div class="progress-section">
                    <div class="progress-container">
                        <span id="current-time">0:00</span>
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span id="duration">3:45</span>
                    </div>
                </div>
                
                <div class="visualizer-container">
                    <div class="music-info">
                        <span>320 KBPS</span>
                        <span>•</span>
                        <span>STEREO</span>
                    </div>
                    
                    <div class="visualizer" id="visualizer">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    
                    <div class="live-indicator" id="live-indicator" style="opacity: 0;">
                        <div class="live-dot"></div>
                        <span>Live</span>
                    </div>
                </div>
            </div>

            <!-- Social Links -->
            <div class="links-grid" id="links-container">
                <a href="https://discord.gg/craftrisehesap" class="link-btn" style="--btn-color: #5865F2" target="_blank">
                    <i class="fa-brands fa-discord"></i>
                    <span class="link-text">Discord</span>
                </a>
                <a href="#" class="link-btn" style="--btn-color: #1DB954" target="_blank">
                    <i class="fa-brands fa-spotify"></i>
                    <span class="link-text">Spotify</span>
                </a>
                <a href="https://www.instagram.com/" class="link-btn" style="--btn-color: #E1306C" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                    <span class="link-text">Instagram</span>
                </a>
                <a href="https://github.com/ygttea" class="link-btn" style="--btn-color: #fff" target="_blank">
                    <i class="fa-brands fa-github"></i>
                    <span class="link-text">GitHub</span>
                </a>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat">
                    <span class="stat-value" id="visitor-count">1.2K</span>
                    <span class="stat-label">Visits</span>
                </div>
                <div class="stat">
                    <span class="stat-value">TR</span>
                    <span class="stat-label">Location</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="uptime">24/7</span>
                    <span class="stat-label">Online</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Volume Control -->
    <div class="volume-control">
        <i class="fa-solid fa-volume-high volume-icon" id="volume-icon"></i>
        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="40">
        <div class="tooltip">Ses Seviyesi</div>
    </div>

    <!-- Audio -->
    <audio id="audio-player" preload="metadata">
        <!-- Discord link - CORS nedeniyle çalmayabilir, simülasyon aktif -->
        <source src="https://cdn.discordapp.com/attachments/1478655200133779518/1478817957726523475/Elif_Dogan_Bir_Ruya_Gordum_Ask_Tesadufleri_Sever_2_Orijinal_Film_Muzikleri.mp3?ex=69a9c80c&is=69a8768c&hm=f7380b04a5e7352f5dc9169eb1cacf5bfea27100141bfdab85372a0f4aad1228&" type="audio/mpeg">
    </audio>

    <script>
        // Şarkı sözleri - gerçek zamanlı senkronizasyon
        const lyricsData = [
            { time: 0, text: "♪ Enstrümantal Giriş..." },
            { time: 12, text: "Bir rüya gördüm" },
            { time: 15, text: "Sensiz geçen gecelerde" },
            { time: 19, text: "Gözlerim ağladı" },
            { time: 22, text: "Gönlüm senden geçenlerde" },
            { time: 26, text: "Aşk tesadüfleri sever" },
            { time: 30, text: "Belki de bir gün buluruz" },
            { time: 34, text: "Kaybolan yıllarımızı" },
            { time: 38, text: "Belki de hiç dönemeyiz" },
            { time: 42, text: "♪ Müzik..." },
            { time: 55, text: "Unutamadım seni" },
            { time: 59, text: "Her gece ağlayarak" },
            { time: 63, text: "Özledim hasretini" },
            { time: 67, text: "Sensizlikten yorularak" },
            { time: 71, text: "Aşk tesadüfleri sever" },
            { time: 75, text: "Belki de bir gün buluruz" },
            { time: 79, text: "Kaybolan yıllarımızı" },
            { time: 83, text: "Belki de hiç dönemeyiz" },
            { time: 87, text: "♪ Enstrümantal..." },
            { time: 110, text: "Bir rüya gördüm" },
            { time: 114, text: "Sensiz geçen gecelerde" },
            { time: 118, text: "Gözlerim ağladı" },
            { time: 122, text: "Gönlüm senden geçenlerde" },
            { time: 126, text: "Aşk tesadüfleri sever" },
            { time: 130, text: "Belki de bir gün buluruz" },
            { time: 134, text: "Kaybolan yıllarımızı" },
            { time: 138, text: "Belki de hiç dönemeyiz" },
            { time: 142, text: "♪ Son..." },
            { time: 155, text: "♪ Enstrümantal Çıkış..." },
            { time: 180, text: "♪ Bitti" }
        ];

        let isPlaying = false;
        let currentTime = 0;
        let duration = 225; // 3:45
        let lyricsInterval;
        let progressInterval;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 500);

            createParticles();
            initAudioPlayer();
            initLyricsPanel();
            initParallax();
            updateStats();
        });

        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Lyrics Panel
        function initLyricsPanel() {
            const panel = document.getElementById('lyrics-panel');
            const toggle = document.getElementById('lyrics-toggle');
            const close = document.getElementById('close-lyrics');
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('lyrics-content');

            // Populate lyrics
            lyricsData.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'lyrics-line';
                div.dataset.time = line.time;
                div.dataset.index = index;
                div.textContent = line.text;
                div.addEventListener('click', () => seekTo(line.time));
                content.appendChild(div);
            });

            function openPanel() {
                panel.classList.add('active');
                overlay.classList.add('active');
                toggle.classList.add('active');
            }

            function closePanel() {
                panel.classList.remove('active');
                overlay.classList.remove('active');
                toggle.classList.remove('active');
            }

            toggle.addEventListener('click', openPanel);
            close.addEventListener('click', closePanel);
            overlay.addEventListener('click', closePanel);

            // Lyrics play button
            document.getElementById('lyrics-play-btn').addEventListener('click', () => {
                document.getElementById('play-btn').click();
            });
        }

        // Audio Player
        function initAudioPlayer() {
            const audio = document.getElementById('audio-player');
            const playBtn = document.getElementById('play-btn');
            const albumArt = document.getElementById('album-art');
            const visualizer = document.getElementById('visualizer');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const currentTimeEl = document.getElementById('current-time');
            const liveIndicator = document.getElementById('live-indicator');
            const volumeSlider = document.getElementById('volume-slider');

            playBtn.addEventListener('click', togglePlay);

            function togglePlay() {
                if (isPlaying) {
                    pause();
                } else {
                    play();
                }
            }

            function play() {
                isPlaying = true;
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                document.getElementById('lyrics-play-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
                albumArt.classList.add('playing');
                visualizer.classList.add('active');
                liveIndicator.style.opacity = '1';

                // Try real audio
                audio.play().catch(() => {
                    console.log('Discord audio blocked, using simulation');
                    simulatePlayback();
                });

                startProgress();
            }

            function pause() {
                isPlaying = false;
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                document.getElementById('lyrics-play-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
                albumArt.classList.remove('playing');
                visualizer.classList.remove('active');
                liveIndicator.style.opacity = '0';
                audio.pause();
                clearInterval(progressInterval);
            }

            function simulatePlayback() {
                progressInterval = setInterval(() => {
                    if (!isPlaying) return;
                    currentTime++;
                    if (currentTime >= duration) {
                        currentTime = 0;
                        pause();
                    }
                    updateProgress();
                    updateLyrics();
                }, 1000);
            }

            function startProgress() {
                if (progressInterval) clearInterval(progressInterval);
                simulatePlayback();
            }

            function updateProgress() {
                const progress = (currentTime / duration) * 100;
                progressFill.style.width = progress + '%';
                currentTimeEl.textContent = formatTime(currentTime);
            }

            function updateLyrics() {
                const lines = document.querySelectorAll('.lyrics-line');
                let activeIndex = -1;

                for (let i = lyricsData.length - 1; i >= 0; i--) {
                    if (currentTime >= lyricsData[i].time) {
                        activeIndex = i;
                        break;
                    }
                }

                lines.forEach((line, index) => {
                    line.classList.remove('active', 'passed');
                    if (index < activeIndex) {
                        line.classList.add('passed');
                    } else if (index === activeIndex) {
                        line.classList.add('active');
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }

            function seekTo(time) {
                currentTime = time;
                updateProgress();
                updateLyrics();
                if (!isPlaying) play();
            }

            // Progress bar click
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                currentTime = Math.floor(pos * duration);
                updateProgress();
                updateLyrics();
            });

            // Volume
            volumeSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value / 100;
            });
            audio.volume = 0.4;

            // Audio events
            audio.addEventListener('timeupdate', () => {
                currentTime = audio.currentTime;
                updateProgress();
                updateLyrics();
            });

            audio.addEventListener('ended', () => {
                currentTime = 0;
                pause();
            });
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Parallax
        function initParallax() {
            const bgImage = document.getElementById('bg-image');
            let mouseX = 0, mouseY = 0;
            let currentX = 0, currentY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            });

            function animate() {
                currentX += (mouseX - currentX) * 0.05;
                currentY += (mouseY - currentY) * 0.05;
                bgImage.style.transform = `scale(1.1) translate(${currentX * 20}px, ${currentY * 20}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Stats
        function updateStats() {
            const visitorEl = document.getElementById('visitor-count');
            let count = 1247;
            
            setInterval(() => {
                if (Math.random() > 0.7) {
                    count++;
                    visitorEl.textContent = count.toLocaleString();
                }
            }, 5000);
        }

        // 3D Tilt
        const card = document.querySelector('.card');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        });
    </script>
</body>
</html>
